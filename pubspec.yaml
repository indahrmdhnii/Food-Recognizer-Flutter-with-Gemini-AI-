name: food_recognizer
description: FoodLens - Food Recognizer App with ML for Dicoding Submission
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Image Picking & Camera (Kriteria 1)
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  image_cropper: ^12.1.1

  # Machine Learning - TFLite/LiteRT (Kriteria 2)
  tflite_flutter: ^0.11.0

  # Firebase ML (Kriteria 2 - Advanced)
  firebase_core: ^3.6.0
  firebase_ml_model_downloader: ^0.3.2+2

  # HTTP & External APIs (Kriteria 3)
  http: ^1.2.2

  # Gemini AI (Kriteria 3 - Advanced)
  google_generative_ai: ^0.4.6

  # Image processing (for Isolate preprocessing)
  image: ^4.2.0

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # State Management
  provider: ^6.1.2

  # Utilities
  flutter_dotenv: ^5.2.1
  path_provider: ^2.1.4
  path: ^1.9.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/models/
    - .env

  # Note: Poppins is loaded via google_fonts package at runtime,
  # no need to bundle font files manually.
